name: Stock Report Email

on:
  schedule:
    # 每个交易日北京时间 9:30 执行（UTC 1:30）
    - cron: '30 1 * * 1-5'
  workflow_dispatch: # 允许手动触发

jobs:
  send_report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install nodemailer axios

      - name: Fetch stock data and send email
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          VERCEL_URL: ${{ secrets.VERCEL_PROJECT_ID }}.vercel.app
        run: |
          node << 'EOF'
          const nodemailer = require('nodemailer');
          const axios = require('axios');

          async function sendReport() {
            // 检查必需的环境变量
            if (!process.env.SMTP_HOST || !process.env.SMTP_USER || !process.env.SMTP_PASS || !process.env.EMAIL_TO) {
              console.log('邮件配置不完整，跳过发送');
              return;
            }

            try {
              // 获取股票数据
              const response = await axios.get(`https://${process.env.VERCEL_URL}/api/quotes`);
              const stockData = response.data;

              if (!stockData.success) {
                throw new Error('获取股票数据失败');
              }

              // 生成邮件内容
              const date = new Date().toLocaleDateString('zh-CN');
              let emailBody = `<h2>📊 A股市场日报 - ${date}</h2>\n\n`;

              emailBody += '<table border="1" cellpadding="10" cellspacing="0" style="border-collapse: collapse; width: 100%;">\n';
              emailBody += '<tr style="background-color: #f0f0f0;"><th>股票</th><th>代码</th><th>最新价</th><th>涨跌幅</th><th>成交量</th></tr>\n';

              if (stockData.data && Array.isArray(stockData.data)) {
                stockData.data.forEach(stock => {
                  const changeColor = stock.pct_chg >= 0 ? '#f54336' : '#4caf50';
                  const changeSymbol = stock.pct_chg >= 0 ? '▲' : '▼';
                  emailBody += `<tr>
                    <td><strong>${stock.name}</strong></td>
                    <td>${stock.ts_code}</td>
                    <td>¥${stock.close.toFixed(2)}</td>
                    <td style="color: ${changeColor};">${changeSymbol} ${stock.pct_chg.toFixed(2)}%</td>
                    <td>${(stock.vol / 10000).toFixed(2)}万手</td>
                  </tr>\n`;
                });
              }

              emailBody += '</table>\n\n';
              emailBody += '<p style="color: #666; font-size: 12px; margin-top: 20px;">数据来源：Tushare | 数据延迟约15分钟</p>';
              emailBody += '<p style="color: #999; font-size: 11px;">⚠️ 本报告仅供参考，不构成投资建议。投资有风险，入市需谨慎。</p>';

              // 配置邮件传输
              const transporter = nodemailer.createTransport({
                host: process.env.SMTP_HOST,
                port: parseInt(process.env.SMTP_PORT || '465'),
                secure: process.env.SMTP_PORT === '465',
                auth: {
                  user: process.env.SMTP_USER,
                  pass: process.env.SMTP_PASS
                }
              });

              // 发送邮件
              const info = await transporter.sendMail({
                from: `"模拟股票实验系统" <${process.env.SMTP_USER}>`,
                to: process.env.EMAIL_TO,
                subject: `📈 A股市场日报 - ${date}`,
                html: emailBody
              });

              console.log('邮件发送成功:', info.messageId);
            } catch (error) {
              console.error('发送邮件失败:', error.message);
              process.exit(1);
            }
          }

          sendReport();
          EOF
